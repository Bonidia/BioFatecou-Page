<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reemitir Certificado</title>
  <script src="../config.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
      padding: 20px;
    }

    .container {
      width: 90%;
      max-width: 600px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }

    input, button {
      width: 100%;
      padding: 16px;
      margin-top: 15px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 12px;
      display: none;
      background: rgba(255,255,255,0.08);
      text-align: left;
      line-height: 1.6;
    }

    .error {
      background: rgba(239,68,68,0.18);
    }

    .success {
      background: rgba(34,197,94,0.18);
    }
  </style>
</head>
<body>

<div class="container">
  <h2>🎓 Reemitir Certificado</h2>
  <p>Digite o código do certificado para localizar o emissor correto.</p>

  <input id="codigo" placeholder="Ex: TK_ABC123">
  <button id="btnBuscar" onclick="buscarEChamar()">Abrir certificado</button>

  <div id="result" class="result"></div>
</div>

<script>
const API_URL = window.APP_CONFIG.API_URL;

const EMISSORES = {
  "inteligente_palestra_ai": "01-certificado.html",
  "inteligentecards": "02-certificado.html",
  "podcast_ia_sala": "03-certificado.html"
};

function getEmitterPath(courseId) {
  return EMISSORES[courseId] || null;
}

async function buscarEChamar() {
  const codigoInput = document.getElementById("codigo");
  const btn = document.getElementById("btnBuscar");
  const result = document.getElementById("result");

  const codigo = codigoInput.value.trim();

  result.style.display = "none";
  result.className = "result";

  if (!codigo) {
    alert("Digite o código.");
    return;
  }

  btn.disabled = true;
  codigoInput.disabled = true;

  try {
    const res = await fetch(`${API_URL}?action=getCertificate&token=${encodeURIComponent(codigo)}`);
    const data = await res.json();

    if (!data.ok) {
      result.style.display = "block";
      result.className = "result error";
      result.innerHTML = "❌ Certificado não encontrado.";
      btn.disabled = false;
      codigoInput.disabled = false;
      return;
    }

    const emitter = getEmitterPath(data.courseId);

    if (!emitter) {
      result.style.display = "block";
      result.className = "result error";
      result.innerHTML = `
        ❌ Nenhum emissor foi cadastrado para este curso.<br><br>
        <b>courseId:</b> ${data.courseId || "—"}<br>
        <b>Curso:</b> ${data.courseTitle || "—"}
      `;
      btn.disabled = false;
      codigoInput.disabled = false;
      return;
    }

    const destino = `${emitter}?token=${encodeURIComponent(data.token)}`;

    result.style.display = "block";
    result.className = "result success";
    result.innerHTML = `
      ✅ Certificado localizado.<br><br>
      <b>Nome:</b> ${data.nome || "—"}<br>
      <b>Curso:</b> ${data.courseTitle || data.courseId || "—"}<br>
      <b>Emissor:</b> ${emitter}
    `;

    setTimeout(() => {
      window.location.href = destino;
    }, 800);

  } catch (e) {
    console.error(e);
    result.style.display = "block";
    result.className = "result error";
    result.innerHTML = "Erro ao localizar o certificado.";
    btn.disabled = false;
    codigoInput.disabled = false;
  }
}

window.addEventListener("load", () => {
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  if (token) {
    document.getElementById("codigo").value = token;
    buscarEChamar();
  }
});
</script>

</body>
</html>
