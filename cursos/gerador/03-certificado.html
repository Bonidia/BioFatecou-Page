<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificado</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="../config.js"></script>

<style>

body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e3a8a);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.container {
  width:90%;
  max-width:600px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  padding:40px;
  border-radius:20px;
  text-align:center;
  box-shadow: 0 25px 60px rgba(0,0,0,0.5);
}

input, button {
  width:100%;
  padding:16px;
  margin-top:15px;
  border-radius:12px;
  border:none;
  font-size:16px;
  box-sizing:border-box;
}

button {
  background: linear-gradient(135deg,#3b82f6,#2563eb);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:disabled {
  opacity:0.6;
}

#loading {
  display:none;
  margin-top:20px;
}

.spinner {
  border:4px solid rgba(255,255,255,0.2);
  border-top:4px solid #3b82f6;
  border-radius:50%;
  width:35px;
  height:35px;
  margin:auto;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  0%{transform:rotate(0)}
  100%{transform:rotate(360deg)}
}
#loading {
  display:none;
  margin-top:20px;
  opacity:0;
  transition: opacity 0.3s ease;
}

#loading.show {
  display:block;
  opacity:1;
}

</style>

</head>

<body>

<div class="container">

  <h2>🎓 Emitir Certificado</h2>

  <p id="status">Validando acesso...</p>

  <input id="nome" placeholder="Digite seu nome completo">

  <button id="btn" onclick="gerar()" disabled>
    Gerar Certificado
  </button>

  <div id="loading">
    <div class="spinner"></div>
    <p>Gerando certificado...</p>
  </div>

  <p>Em caso de problemas, enviar e-mail para: bonidia@utfpr.edu.br</p>

</div>

<script>
const API_URL = window.APP_CONFIG.API_URL;

const params = new URLSearchParams(window.location.search);
const token = params.get("token");

const statusEl = document.getElementById("status");
const nomeInput = document.getElementById("nome");
const btn = document.getElementById("btn");
const loading = document.getElementById("loading");

let tokenValid = false;
let emittedData = null;

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function showFatal(message) {
  document.body.innerHTML = `<h2 style="color:white;text-align:center;">${message}</h2>`;
}

function setLoading(isLoading) {
  if (isLoading) {
    loading.classList.add("show");
    btn.disabled = true;
    nomeInput.disabled = true;
  } else {
    loading.classList.remove("show");
    btn.disabled = !tokenValid;
    nomeInput.disabled = false;
  }
}

function formatDateBR(dateIso) {
  if (!dateIso) return new Date().toLocaleDateString("pt-BR");
  return new Date(dateIso).toLocaleDateString("pt-BR");
}

// =====================
// VALIDAR TOKEN
// =====================
async function validarToken() {
  if (!token) {
    showFatal("❌ Token ausente ou inválido.");
    return;
  }

  try {
    const res = await fetch(`${API_URL}?action=validateToken&token=${encodeURIComponent(token)}`);
    const data = await res.json();

    if (!data.valid) {
      if (data.reason === "already_used") {
        // pode já ter certificado salvo, então tentamos buscar
        await tentarCarregarCertificadoExistente();
        return;
      }

      if (data.reason === "expired") {
        await tentarCarregarCertificadoExistente("❌ Este link expirou.");
        return;
      }

      showFatal("❌ Token inválido.");
      return;
    }

    tokenValid = true;
    statusEl.innerText = "Acesso validado ✔";
    btn.disabled = false;
  } catch (e) {
    console.error(e);
    showFatal("❌ Erro ao validar o acesso.");
  }
}

// =====================
// TENTAR CARREGAR CERTIFICADO JÁ EMITIDO
// =====================
async function tentarCarregarCertificadoExistente(fallbackMessage = "❌ Certificado já utilizado.") {
  try {
    const res = await fetch(`${API_URL}?action=getCertificate&token=${encodeURIComponent(token)}`);
    const data = await res.json();

    if (data.ok) {
      emittedData = data;
      statusEl.innerText = "Certificado já emitido ✔";
      nomeInput.value = data.nome || "";
      nomeInput.disabled = true;
      btn.disabled = false;
      btn.innerText = "Abrir certificado";
      tokenValid = true;
      return;
    }

    showFatal(fallbackMessage);
  } catch (e) {
    console.error(e);
    showFatal(fallbackMessage);
  }
}

// =====================
// EMITIR CERTIFICADO
// =====================
async function emitirCertificado(nome) {
  const res = await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify({
      action: "issueCertificate",
      token: token,
      nome: nome
    })
  });

  return await res.json();
}

// =====================
// GERAR
// =====================
async function gerar() {
  const nome = nomeInput.value.trim();

  if (!tokenValid) {
    alert("Token ainda não validado.");
    return;
  }

  if (emittedData && emittedData.nome) {
    abrirCertificado(emittedData.nome, emittedData.issuedAt || new Date().toISOString());
    return;
  }

  if (!nome) {
    alert("Digite seu nome completo.");
    return;
  }

  setLoading(true);

  try {
    const data = await emitirCertificado(nome);

    if (!data.ok) {
      if (data.error === "token_already_used") {
        await tentarCarregarCertificadoExistente();
        setLoading(false);
        return;
      }

      if (data.error === "token_expired") {
        alert("Este token expirou.");
        setLoading(false);
        return;
      }

      alert("Não foi possível emitir o certificado.");
      setLoading(false);
      return;
    }

    emittedData = data;

    statusEl.innerText = "Certificado emitido ✔";
    btn.innerText = "Abrir certificado";
    nomeInput.disabled = true;
    loading.classList.remove("show");

    abrirCertificado(data.nome, data.issuedAt);
  } catch (e) {
    console.error(e);
    alert("Erro ao gerar certificado.");
    setLoading(false);
  }
}

// =====================
// ABRIR CERTIFICADO
// =====================
function abrirCertificado(nome, issuedAt) {
  const nomeSeguro = escapeHtml(nome);
  const dataEmissao = formatDateBR(issuedAt);
  const urlVerificacao = `https://inteligentehub.com.br/cursos/gerador/consultar.html?token=${encodeURIComponent(token)}`;

  const win = window.open("", "", "width=900,height=1200");

  if (!win) {
    alert("O navegador bloqueou a janela do certificado.");
    return;
  }

  win.document.write(`
    <html lang="pt-br">
    <head>
      <meta charset="UTF-8">
      <title>Certificado</title>
      <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"><\/script>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"><\/script>

      <style>
        @page {
          size: A4;
          margin: 0;
        }

        body {
          margin:0;
          font-family: Georgia, serif;
          background:#e5e7eb;
        }

        .page {
          width:210mm;
          min-height:297mm;
          background:white;
          position:relative;
          padding:70px;
          box-sizing:border-box;
        }

        .watermark {
          position:absolute;
          top:50%;
          left:50%;
          transform:translate(-50%, -50%);
          opacity:0.06;
          width:65%;
        }

        .border {
          position:absolute;
          top:25px;
          left:25px;
          right:25px;
          bottom:25px;
          border:3px solid #1e3a8a;
        }

        .content {
          position:relative;
          z-index:2;
          text-align:center;
          height:100%;
          display:flex;
          flex-direction:column;
          justify-content:space-between;
        }

        .header {
          margin-top:10px;
        }

        .title {
          font-size:44px;
          font-weight:bold;
          color:#1e3a8a;
          letter-spacing:3px;
        }

        .subtitle {
          margin-top:8px;
          font-size:18px;
          color:#374151;
        }

        .nome {
          font-size:34px;
          margin:35px 0;
          font-weight:bold;
          color:#111827;
        }

        .descricao {
          font-size:18px;
          line-height:1.7;
          color:#374151;
          max-width:720px;
          margin:0 auto;
        }

        .institucional {
          margin-top:25px;
          font-size:16px;
          color:#4b5563;
        }

        .footer {
          display:flex;
          justify-content:space-between;
          align-items:flex-end;
          margin-top:50px;
          gap:20px;
        }

        .selo-assinatura {
          display:flex;
          align-items:center;
          justify-content:center;
          gap:20px;
          margin-top:40px;
        }

        .selo-assinatura img {
          width:140px;
          height:auto;
          opacity:0.95;
          filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2));
          transform:rotate(-5deg);
        }

        .qrcode {
          text-align:center;
        }

        .codigo {
          margin-top:10px;
          font-size:13px;
          color:#555;
          word-break:break-word;
          max-width:220px;
        }

        .actions {
          position:absolute;
          top:20px;
          right:30px;
          z-index:10;
        }

        .print-btn {
          background:#1e3a8a;
          color:white;
          border:none;
          padding:10px 14px;
          border-radius:8px;
          cursor:pointer;
          font-size:13px;
          margin-left:5px;
        }

        .print-btn:hover {
          background:#172554;
        }

        @media print {
          .actions {
            display:none;
          }
        }
      </style>
    </head>

    <body>
      <div class="page">
        <div class="actions">
          <button class="print-btn" onclick="window.print()">🖨️ Imprimir</button>
          <button class="print-btn" onclick="baixarPDFInterno()">⬇️ PDF</button>
        </div>

        <div class="border"></div>
        <img src="logo.png" class="watermark" alt="Logo">

        <div class="content">
          <div class="header">
            <div class="title">CERTIFICADO</div>
            <div class="subtitle">Declaração de Participação</div>
          </div>

          <div>
            <p class="descricao">Certificamos que</p>

            <div class="nome">${nomeSeguro}</div>

            <p class="descricao">
              assistiu o PodCast <b>“Ponto de apoio - Como usar a IA para facilitar o dia a dia na sala de aula”</b>,
              com carga horária de <b>1 hora e 30 minutos</b>, contribuindo para a formação em
              tecnologias emergentes, ética e impacto social por meio da Inteligência Artificial.
            </p>

            <p class="institucional">
              O projeto <b>InteliGente</b> é uma iniciativa de extensão vinculada à
              <b>Universidade Tecnológica Federal do Paraná (UTFPR) – Campus Cornélio Procópio</b>.
            </p>

            <p class="institucional" style="margin-top:15px;">
              Emitido em ${dataEmissao}
            </p>
          </div>

          <div class="footer">
            <div class="selo-assinatura">
              <img src="selobg.png" alt="Selo InteliGente">
            </div>

            <div class="qrcode">
              <canvas id="qrcode"></canvas>
              <div class="codigo">Código de verificação: ${token}</div>
            </div>
          </div>
        </div>
      </div>

      <script>
        function baixarPDFInterno() {
          const element = document.querySelector(".page");

          const opt = {
            margin: 0,
            filename: "certificado_${token}.pdf",
            image: { type: "jpeg", quality: 0.98 },
            html2canvas: { scale: 3 },
            jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
          };

          html2pdf().set(opt).from(element).save();
        }

        QRCode.toCanvas(document.getElementById("qrcode"), "${urlVerificacao}");
      <\/script>
    </body>
    </html>
  `);

  win.document.close();
}

// =====================
// INÍCIO
// =====================
validarToken();
</script>

</body>
</html>
